name: Release

# À chaque push sur la branche principale : incrémente la version (patch),
# construit l'app Windows, publie une release GitHub avec les installeurs et
# les garde aussi comme artifact du run. L'app interroge ensuite l'API GitHub
# pour proposer la mise à jour à l'utilisateur.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

# Empêche deux releases concurrentes (les bumps de version se marcheraient dessus).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Volontairement SANS `cache: npm` : la clé de cache (hash du lockfile) ne
      # changeait jamais tant que la release n'aboutissait pas, donc un état de
      # cache corrompu était restauré à l'identique à chaque run.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # npm (10.8 et 10.9 testés) crashe systématiquement sur ce runner avec
      # « Exit handler never called! », sur `npm ci` comme `npm install`, même
      # après purge du cache : bug de npm sur l'image Windows. On installe donc
      # avec pnpm, dont l'installeur est un code entièrement différent.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # En local le target est déporté vers C:/dev/dl-target (chemin sans espace, car
      # le projet est sous OneDrive). En CI le workspace n'a pas d'espace : on retire
      # cette surcharge pour utiliser le target par défaut (src-tauri/target).
      - name: Use default target dir
        shell: bash
        run: rm -f src-tauri/.cargo/config.toml

      # Bump en node pur (shell par défaut, aucun npm) : évite le crash
      # « Exit handler never called! » de npm sous Git Bash sur Windows.
      - name: Bump version (patch)
        id: bump
        run: node .github/bump-version.mjs

      # `pnpm import` convertit package-lock.json en pnpm-lock.yaml : on installe
      # exactement les mêmes versions qu'en local. Sentinelle : on vérifie que les
      # binaires attendus existent réellement avant de continuer.
      - name: Install dependencies (pnpm)
        run: |
          pnpm import
          pnpm install --frozen-lockfile
          if (-not (Test-Path "node_modules/.bin/tauri.cmd") -or -not (Test-Path "node_modules/.bin/tsc.cmd")) {
            Write-Error "node_modules/.bin incomplet après pnpm install (tauri.cmd / tsc.cmd absents)."
            exit 1
          }
          exit 0

      - name: Build (Tauri)
        env:
          # Injecté dans le frontend : active la vérification de mise à jour (owner/repo).
          VITE_GITHUB_REPO: ${{ github.repository }}
        run: |
          # Le beforeBuildCommand commité utilise npm (cassé sur ce runner) : on le
          # surcharge via un fichier de config CI, SANS toucher au tauri.conf.json
          # commité (le build local reste 100 % npm).
          '{"build":{"beforeBuildCommand":"pnpm run build"}}' | Out-File -Encoding utf8 tauri.ci.conf.json
          pnpm exec tauri build --config tauri.ci.conf.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevLauncher-v${{ steps.bump.outputs.version }}
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: DevLauncher v${{ steps.bump.outputs.version }}
          body: "Installeurs Windows en pièces jointes (.msi et -setup.exe)."
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"

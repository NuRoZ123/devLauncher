name: Release

# À chaque push sur la branche principale : incrémente la version (patch),
# construit l'app Windows, publie une release GitHub avec les installeurs et
# les garde aussi comme artifact du run. L'app interroge ensuite l'API GitHub
# pour proposer la mise à jour à l'utilisateur.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

# Empêche deux releases concurrentes (les bumps de version se marcheraient dessus).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Node 22 (npm ≥ 10.9) : versions où le crash npm « Exit handler never
      # called! » est corrigé. Volontairement SANS `cache: npm` : la clé de cache
      # (hash du lockfile) ne changeait jamais tant que la release n'aboutissait
      # pas, donc le cache corrompu par le 1er crash était restauré à chaque run
      # → échec en boucle.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # En local le target est déporté vers C:/dev/dl-target (chemin sans espace, car
      # le projet est sous OneDrive). En CI le workspace n'a pas d'espace : on retire
      # cette surcharge pour utiliser le target par défaut (src-tauri/target).
      - name: Use default target dir
        shell: bash
        run: rm -f src-tauri/.cargo/config.toml

      # Bump en node pur (shell par défaut, aucun npm) : évite le crash
      # « Exit handler never called! » de npm sous Git Bash sur Windows.
      - name: Bump version (patch)
        id: bump
        run: node .github/bump-version.mjs

      # Le bug npm « Exit handler never called! » peut laisser node_modules vide
      # tout en sortant avec le code 0 (step vert, échec « tauri/tsc not
      # recognized » plus loin). On vérifie donc explicitement que les binaires
      # sont là ; sinon : purge du cache npm + nouvelle tentative, et échec
      # franc si la 2e tentative ne suffit pas.
      - name: Install dependencies
        run: |
          node -v; npm -v
          npm ci --no-audit --no-fund
          if (-not (Test-Path "node_modules/.bin/tauri.cmd") -or -not (Test-Path "node_modules/.bin/tsc.cmd")) {
            Write-Host "Install incomplète (bug npm) : purge du cache puis nouvelle tentative..."
            npm cache clean --force
            if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
            npm install --no-audit --no-fund
          }
          if (-not (Test-Path "node_modules/.bin/tauri.cmd") -or -not (Test-Path "node_modules/.bin/tsc.cmd")) {
            Write-Error "node_modules/.bin incomplet après deux tentatives (tauri.cmd / tsc.cmd absents)."
            exit 1
          }
          exit 0

      - name: Build (Tauri)
        env:
          # Injecté dans le frontend : active la vérification de mise à jour (owner/repo).
          VITE_GITHUB_REPO: ${{ github.repository }}
        run: npm run tauri build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevLauncher-v${{ steps.bump.outputs.version }}
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: DevLauncher v${{ steps.bump.outputs.version }}
          body: "Installeurs Windows en pièces jointes (.msi et -setup.exe)."
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
